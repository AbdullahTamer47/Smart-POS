version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: smartpos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartpos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpos}
      POSTGRES_DB: ${POSTGRES_DB:-smartpos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartpos} -d ${POSTGRES_DB:-smartpos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - smartpos-network

  pgbouncer:
    image: bitnami/pgbouncer:latest
    container_name: smartpos-pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/opt/bitnami/pgbouncer/conf/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/opt/bitnami/pgbouncer/conf/userlist.txt:ro
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${POSTGRES_USER:-smartpos}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD:-smartpos}
      POSTGRESQL_DATABASE: ${POSTGRES_DB:-smartpos}
      PGBOUNCER_DATABASE: ${POSTGRES_DB:-smartpos}
      PGBOUNCER_AUTH_TYPE: scram-sha-256
    networks:
      - smartpos-network

  redis:
    image: redis:7-alpine
    container_name: smartpos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-smartpos}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - smartpos-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: smartpos-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-smartpos}:${POSTGRES_PASSWORD:-smartpos}@pgbouncer:6432/${POSTGRES_DB:-smartpos}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-smartpos}:${POSTGRES_PASSWORD:-smartpos}@postgres:5432/${POSTGRES_DB:-smartpos}
      REDIS_URL: redis://:${REDIS_PASSWORD:-smartpos}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@smartpos.local}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - uploads:/app/uploads
    networks:
      - smartpos-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: smartpos-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/ws}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-SmartPOS}
    networks:
      - smartpos-network

  nginx:
    image: nginx:alpine
    container_name: smartpos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - uploads:/var/www/uploads:ro
    networks:
      - smartpos-network

  mailhog:
    image: mailhog/mailhog
    container_name: smartpos-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - smartpos-network

  prometheus:
    image: prom/prometheus
    container_name: smartpos-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - smartpos-network

  grafana:
    image: grafana/grafana
    container_name: smartpos-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ${GRAFANA_PLUGINS:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    networks:
      - smartpos-network

volumes:
  pgdata:
    name: smartpos_pgdata
  redis-data:
    name: smartpos_redis_data
  prometheus-data:
    name: smartpos_prometheus_data
  grafana-data:
    name: smartpos_grafana_data
  uploads:
    name: smartpos_uploads

networks:
  smartpos-network:
    name: smartpos_network
    driver: bridge